name: Daily Commit

on:
  schedule:
    - cron: "10 10 * * *"

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Git
        run: |
          git config --global user.email "olinabin2004@gmail.com"
          git config --global user.name "Nabin Oli"

      - name: Make a commit
        run: |
          echo "$(date)" >> commit.txt
          git add commit.txt
          git commit -m "Daily commit $(date)"
          git push
